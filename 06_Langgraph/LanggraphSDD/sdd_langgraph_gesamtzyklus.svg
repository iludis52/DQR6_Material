<svg width="100%" viewBox="0 0 1160 850" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>SDD-Gesamtzyklus für LangGraph-Agenten — Prozess-Übersichtsblatt</title>
<desc>Ablauf von Kundennotizen über Dekomposition (Phase 0), dann pro Teilgraph: Spec-Interview (Phase 1, frische Sitzung), Review (Phase 2 in zwei Stufen: Spec-Lint-Skript und vier unabhängige LLM-Pässe), Plan, Tests, Implementierung, abschließend Abnahme und Integration mit Schleife zum nächsten Teilgraphen. Rückpfeile: Review-Befunde zurück ins Interview, Kontrakt-Rückspiel zurück in die prozess.md. Rechts: Dateilegende der Werkzeugkette, Befund-Routing-Tabelle und die drei Prüfebenen.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ==================== Kopf ==================== -->
<text x="40" y="42" font-size="20" font-weight="700" fill="#3B3A37">SDD-Gesamtzyklus für LangGraph-Agenten</text>
<text x="40" y="62" font-size="12" fill="#6E6D68">Prozess-Übersichtsblatt · 6 Phasen · 3 LLM-Rollen (Interviewer / Prüfer / Implementierer) · Student als Regisseur und Kunden-Proxy</text>

<!-- ==================== Linke Spalte: Zyklus ==================== -->

<!-- Kundennotizen -->
<rect x="200" y="84" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="300" y="106" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Kundennotizen (roh)</text>
<line x1="300" y1="128" x2="300" y2="148" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Phase 0 -->
<rect x="170" y="152" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="300" y="170" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Phase 0 · Dekomposition</text>
<text x="300" y="190" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#534AB7">Phase-0-Prompt → prozess.md · Kontrakte</text>
<line x1="300" y1="208" x2="300" y2="232" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Container: pro Teilgraph -->
<rect x="120" y="236" width="360" height="480" rx="12" fill="none" stroke="#898781" stroke-width="0.5" stroke-dasharray="4 4"/>
<text x="300" y="258" text-anchor="middle" font-size="12" fill="#52514E">Pro Teilgraph, in Entwicklungsreihenfolge</text>

<!-- Phase 1 -->
<rect x="170" y="272" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="300" y="290" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Phase 1 · Spec-Interview</text>
<text x="300" y="310" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#534AB7">Phase-1-Prompt, frische Sitzung → spec.md</text>
<line x1="300" y1="328" x2="300" y2="356" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Kontrakt-Rückspiel Phase 1 -> Phase 0 (rechts) -->
<path d="M430 296 L456 296 L456 184 L434 184" fill="none" stroke="#898781" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
<text x="472" y="240" font-size="10" fill="#6E6D68" transform="rotate(90 472 240)" text-anchor="middle">[OFFEN: Kontrakt] → prozess.md</text>

<!-- Phase 2 (zweistufig) -->
<rect x="170" y="360" width="260" height="76" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="300" y="375" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Phase 2 · Review der Spec</text>
<text x="300" y="390" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#0F6E56">2a · Spec-Lint (Pythonskript, erzeugt json)</text>
<text x="300" y="405" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#0F6E56">2b · LLM-Review, erzeugt json</text>
<text x="300" y="420" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#0F6E56">2c · Review-Interview, korrigiert spec.md</text>
<line x1="300" y1="436" x2="300" y2="464" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Phase 3 -->
<rect x="170" y="468" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="300" y="486" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Phase 3 · Plan &amp; Tasks</text>
<text x="300" y="506" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#534AB7">Standardreihenfolge, fix · T1–T9</text>
<line x1="300" y1="524" x2="300" y2="552" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Phase 4 -->
<rect x="170" y="556" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="300" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Phase 4 · Tests zuerst</text>
<text x="300" y="594" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#0F6E56">Strukturtests + Router (rot) · Topologie einfrieren</text>
<line x1="300" y1="612" x2="300" y2="640" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Phase 5 -->
<rect x="170" y="644" width="260" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="300" y="662" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Phase 5 · Implementierung</text>
<text x="300" y="682" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#534AB7">Konventions-Skill im Kontext · Tests grün</text>

<line x1="300" y1="716" x2="300" y2="744" stroke="#898781" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Abnahme -->
<rect x="170" y="748" width="260" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="300" y="766" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Abnahme &amp; Integration</text>
<text x="300" y="786" text-anchor="middle" dominant-baseline="central" font-size="11.5" fill="#0F6E56">Beispiel-Durchläufe · Kontrakt-Invarianten</text>
<text x="300" y="832" text-anchor="middle" font-size="12" fill="#52514E">↻ nächster Teilgraph → zurück zu Phase 1</text>

<!-- ==================== Rechte Spalte ==================== -->
<line x1="530" y1="90" x2="530" y2="820" stroke="#D9D7CF" stroke-width="0.75"/>

<!-- Dateilegende -->
<text x="560" y="104" font-size="14" font-weight="700" fill="#3B3A37">Dateien der Werkzeugkette</text>
<line x1="560" y1="114" x2="1120" y2="114" stroke="#D9D7CF" stroke-width="0.75"/>
<g font-size="11" fill="#444441">
  <g font-family="Consolas, Menlo, monospace" font-size="10.5" fill="#3C3489">
    <text x="592" y="134">Phase0_meta_prompt_dekomposition.md</text>
    <text x="592" y="158">Phase1_meta_prompt_spec_interview.md</text>
    <text x="592" y="182">Phase2a_spec_lint.py</text>
    <text x="592" y="206">Phase2_review_checkliste.md</text>
    <text x="592" y="230">Phase3_plan_vorlage.md</text>
    <text x="592" y="254">Phase4_test_vorlage.py</text>
    <text x="592" y="278">Phase5_langgraph_konventionen.md</text>
  </g>
  <g font-weight="700" fill="#6E6D68">
    <text x="560" y="134">0</text>
    <text x="560" y="158">1</text>
    <text x="560" y="182">2a</text>
    <text x="560" y="206">2b</text>
    <text x="560" y="230">3</text>
    <text x="560" y="254">4</text>
    <text x="560" y="278">5</text>
  </g>
  <g fill="#52514E">
    <text x="880" y="134">→ prozess.md + Kontrakte</text>
    <text x="880" y="158">→ spec.md (je Teilgraph)</text>
    <text x="880" y="182">→ Lint-Report (⚙-Punkte)</text>
    <text x="880" y="206">→ 4 × Befunde-JSON</text>
    <text x="880" y="230">→ plan.md / tasks</text>
    <text x="880" y="254">→ tests/ (erst rot)</text>
    <text x="880" y="278">→ Code, Tests grün</text>
  </g>
</g>
<text x="560" y="302" font-size="10.5" fill="#6E6D68">Projektunabhängig, unverändert wiederverwendet: 2a (Spec-Lint) und 5 (Konventions-Skill) —</text>
<text x="560" y="318" font-size="10.5" fill="#6E6D68">alle übrigen Artefakte werden pro Projekt instanziiert.</text>

<!-- Farbcode -->
<rect x="560" y="336" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="582" y="347" font-size="11" fill="#444441">erzeugende Phasen — Interview · Plan · Implementierung</text>
<rect x="560" y="358" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="582" y="369" font-size="11" fill="#444441">prüfende Phasen — Lint/Review · Tests · Abnahme</text>

<!-- Befund-Routing -->
<text x="560" y="404" font-size="14" font-weight="700" fill="#3B3A37">Befund-Routing — bei jedem roten Ergebnis zuerst fragen: welche Ebene?</text>
<line x1="560" y1="414" x2="1120" y2="414" stroke="#D9D7CF" stroke-width="0.75"/>
<g font-size="11">
  <g fill="#444441" font-weight="500">
    <text x="560" y="434">Lint- oder Review-Befund (2a/2b)</text>
    <text x="560" y="458">Strukturtest rot</text>
    <text x="560" y="482">Router-Test rot</text>
    <text x="560" y="506">Eval unter Schwelle</text>
    <text x="560" y="530">Abnahme scheitert inhaltlich</text>
  </g>
  <g fill="#52514E">
    <text x="820" y="434">→ Rückfragen ins Spec-Interview (Phase 1)</text>
    <text x="820" y="458">→ Implementierung reparieren (Plan-Block A/C)</text>
    <text x="820" y="482">→ Router fixen · fehlt ein Fall → Phase 1</text>
    <text x="820" y="506">→ Skill iterieren — kein Codeeingriff</text>
    <text x="820" y="530">→ zurück zu Phase 1, Kette neu durchlaufen</text>
  </g>
</g>

<!-- Drei Prüfebenen -->
<text x="560" y="588" font-size="14" font-weight="700" fill="#3B3A37">Drei Prüfebenen, drei Zeitpunkte, drei Prüfobjekte</text>
<line x1="560" y1="598" x2="1120" y2="598" stroke="#D9D7CF" stroke-width="0.75"/>
<g font-size="11" fill="#444441">
  <text x="560" y="618"><tspan font-weight="700" fill="#085041">Lint (2a)</tspan> prüft das Dokument — braucht nur die spec.md</text>
  <text x="560" y="642"><tspan font-weight="700" fill="#085041">Strukturtests (4)</tspan> prüfen den Code gegen die Spec — brauchen das Graph-Gerüst</text>
  <text x="560" y="666"><tspan font-weight="700" fill="#085041">Evals (Abnahme)</tspan> prüfen die Qualität gegen die Rubrik — brauchen den fertigen Agenten</text>
</g>

<!-- Leitprinzip -->
<rect x="560" y="700" width="560" height="72" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="576" y="726" font-size="12" font-weight="700" fill="#3B3A37">„Stabiles früh, Volatiles spät"</text>
<text x="576" y="746" font-size="11" fill="#52514E">Graph-Topologie: getestet und ab T4 eingefroren — Änderung nur über Spec → Review → Tests.</text>
<text x="576" y="762" font-size="11" fill="#52514E">Kundeniteration läuft über Skills: Markdown-Austausch, ohne Codeänderung.</text>
</svg>
